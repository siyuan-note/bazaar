[uwsgi]
#项目目录
chdir=/www/wwwroot/flask_test

#指定项目application
wsgi-file=/www/wwwroot/flask_test/app.py

#python 程序内用以启动的application 变量名
callable=app

# 进程个数
processes=4

# 线程个数
threads=2

#指定启动时的pid文件路径（用于停止服务和重启服务，请勿删除）
pidfile=/www/wwwroot/flask_test/uwsgi.pid

; ---------- 监听方式二选一 ----------
; 与 Nginx + uwsgi_pass unix:... 配合时：用 socket，并注释掉下面的 http
：socket 放在 chdir 下，避免 /run/uwsgi 未创建导致 bind 失败
socket = %(chdir)/siyuan-pic.sock
chmod-socket = 666

; 仅调试或无 Nginx 时：直接 HTTP（与上面 socket 二选一）
# 指定ip及端口
# 默认http模式，可切换至socket模式
#http=0.0.0.0:5000
#socket=0.0.0.0:5000

#启动uwsgi的用户名和用户组
uid=www
gid=www

#启用主进程
master=true

# 设置缓冲区大小
buffer-size = 32768

# 后台运行,并输出日志
daemonize = /www/wwwlogs/python/flask_test/uwsgi.log

# 自定义设置项请写到该处, 
; 与当前 Python 环境一致（你机器上的 venv）
virtualenv = /www/server/pyporject_evn/venv
# 如果项目的启动方式您不想使用 wsgi-file 请注释掉,但不要删除，通讯方式(http, socket)同理;
# 最好以上面相同的格式 <注释 + 换行 + key = value> 进行书写，方便以后查阅
