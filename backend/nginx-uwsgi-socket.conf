# 示例：放入 /etc/nginx/conf.d/ 或在主配置里 include，并重载 nginx -s reload
# uwsgi_pass 路径须与 uwsgi.ini 里 socket= 完全一致（示例为 chdir=/www/wwwroot/flask_test）

server {
    listen 80;
    listen [::]:80;
    #server_name 填上你的域名 or ip地址;

    # 可选：合并 URL 里多余斜杠，//api/ 与 /api/ 行为一致
    merge_slashes on;

    # 与 /pic 同域名的静态：http://<host>/pic/public/a.png -> /www/wwwroot/public/a.png
    # 须写在 location /pic/ 之前；更长前缀优先，避免被 rewrite 进 Flask
    location /pic/public/ {
        alias /www/wwwroot/public/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 对外前缀 /pic/ 映射到 Flask 根路径：/pic/health -> /health，/pic/api/... -> /api/...
    # 无 rewrite 时 Flask 收到的是 /pic/health，应用里只有 /health，会 404
    location /pic/ {
        rewrite ^/pic/?(.*)$ /$1 break;
        include uwsgi_params;
        uwsgi_pass unix:/www/wwwroot/flask_test/siyuan-pic.sock;
    }

    # 静态文件：http://<host>/public/... -> 本机目录 /www/wwwroot/public/
    location /public/ {
        alias /www/wwwroot/public/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        return 404;
    }
}
